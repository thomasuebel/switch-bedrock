<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Bedrock Bridge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Switch Bedrock Bridge</h1>
        <p class="subtitle">Connect your Nintendo Switch to a Java Minecraft server</p>

        <div id="status" class="status"></div>

        <form id="config-form">
            <label for="address">Java Server Address</label>
            <input type="text" id="address" name="address"
                   value="{{ server.address }}" placeholder="mc.example.com" required>

            <label for="port">Java Server Port</label>
            <input type="number" id="port" name="port"
                   value="{{ server.port }}" min="1" max="65535" required>

            <label for="auth_type">Authentication</label>
            <select id="auth_type" name="auth_type">
                <option value="offline" {{ 'selected' if server.auth_type == 'offline' }}>Offline (no Java account needed)</option>
                <option value="online" {{ 'selected' if server.auth_type == 'online' }}>Online (Java account required)</option>
                <option value="floodgate" {{ 'selected' if server.auth_type == 'floodgate' }}>Floodgate (server has Floodgate plugin)</option>
            </select>

            <button type="submit">Save &amp; Restart</button>
        </form>

        <div class="instructions">
            <h2>How to connect</h2>
            <ol>
                <li>Configure the Java server above and click <strong>Save &amp; Restart</strong></li>
                <li>On your Switch, open Minecraft and go to <strong>Play &rarr; Friends</strong></li>
                <li>Wait a few seconds &mdash; a LAN game will appear</li>
                <li>Join and play!</li>
            </ol>
        </div>
    </div>

    <script>
        const form = document.getElementById('config-form');
        const statusEl = document.getElementById('status');

        function showStatus(msg, isError) {
            statusEl.textContent = msg;
            statusEl.className = 'status ' + (isError ? 'error' : 'success');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                address: form.address.value,
                port: parseInt(form.port.value, 10),
                auth_type: form.auth_type.value,
            };
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (res.ok) {
                    showStatus('Saved! GeyserMC is restarting...', false);
                } else {
                    showStatus('Error: ' + data.error, true);
                }
            } catch (err) {
                showStatus('Network error: ' + err.message, true);
            }
        });

        // Check GeyserMC status on load
        fetch('/api/status')
            .then(r => r.json())
            .then(data => {
                if (data.geyser_running) {
                    showStatus('GeyserMC is running', false);
                } else {
                    showStatus('GeyserMC is not running', true);
                }
            })
            .catch(() => {});
    </script>
</body>
</html>
