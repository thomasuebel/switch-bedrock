name: Docker Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check out master for compose bump
        uses: actions/checkout@v4
        with:
          ref: master
          path: master-checkout

      - name: Sync docker-compose.yml on master
        working-directory: master-checkout
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i -E "s|^([[:space:]]*image:[[:space:]]*ghcr\.io/thomasuebel/switch-bedrock):[^[:space:]]+\$|\1:${VERSION}|" docker-compose.yml
          if git diff --quiet docker-compose.yml; then
            echo "docker-compose.yml already pins ${VERSION} — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git commit -m "Sync docker-compose.yml to v${VERSION} [skip ci]"
          git push origin master
